<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --dark-bg: #1a1a1a;
            --darker-bg: #0f0f0f;
            --accent-orange: #d97706;
            --accent-orange-light: #f97316;
            --accent-orange-dark: #b45309;
            --white-tint: #f5f5f5;
            --white-tint-light: #e8e8e8;
            --white-tint-muted: #a0a0a0;
            --border-color: #333333;
            --hover-bg: #2a2a2a;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white-tint);
            line-height: 1.6;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            gap: 0;
        }

        /* ── Sidebar ── */
        .sidebar {
            background-color: var(--darker-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--accent-orange);
        }

        .logo {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-orange-light));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--darker-bg);
            font-size: 20px;
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-orange-light);
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tab-btn {
            padding: 12px 14px;
            border-radius: 6px;
            border: 1px solid transparent;
            background-color: transparent;
            color: var(--white-tint);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn:hover {
            background-color: var(--hover-bg);
            border-color: var(--accent-orange);
            color: var(--accent-orange-light);
        }

        .tab-btn.active {
            background-color: var(--accent-orange);
            color: var(--darker-bg);
            font-weight: 600;
            border-color: var(--accent-orange-light);
        }

        .tab-icon {
            font-size: 18px;
            width: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab-badge {
            margin-left: auto;
            background-color: var(--accent-orange);
            color: var(--darker-bg);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .tab-btn.active .tab-badge {
            background-color: var(--darker-bg);
            color: var(--accent-orange);
        }

        /* ── Main Content ── */
        .main-content {
            display: flex;
            flex-direction: column;
            background-color: var(--dark-bg);
            overflow: hidden;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 25px;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }

        /* ── Chat Tab ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.assistant .message-content {
            background-color: var(--hover-bg);
            border: 1px solid var(--border-color);
            color: var(--white-tint-light);
        }

        .message.user .message-content {
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-orange-light));
            color: var(--darker-bg);
            font-weight: 500;
        }

        /* ── Tasks Tab ── */
        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .task-item {
            padding: 14px;
            background-color: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-item:hover {
            border-color: var(--accent-orange);
            background-color: var(--accent-orange-dark);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent-orange);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 12px;
            color: var(--darker-bg);
            background-color: transparent;
        }

        .task-checkbox.checked {
            background-color: var(--accent-orange);
            color: var(--darker-bg);
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-weight: 500;
            color: var(--white-tint-light);
            word-break: break-word;
        }

        .task-due {
            font-size: 12px;
            color: var(--white-tint-muted);
            margin-top: 4px;
        }

        .task-priority {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .task-priority.high {
            background-color: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .task-priority.medium {
            background-color: rgba(234, 179, 8, 0.2);
            color: #fde047;
        }

        .task-priority.low {
            background-color: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .task-delete {
            cursor: pointer;
            color: var(--accent-orange-light);
            font-size: 16px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .task-delete:hover {
            background-color: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        /* ── Assignments Tab ── */
        .assignments-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .assignment-item {
            padding: 14px;
            background-color: var(--hover-bg);
            border: 1px solid var(--accent-orange);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.2s;
        }

        .assignment-item:hover {
            background-color: var(--accent-orange-dark);
            border-color: var(--accent-orange-light);
        }

        .assignment-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .assignment-title {
            font-weight: 600;
            color: var(--white-tint-light);
        }

        .assignment-due {
            font-size: 12px;
            color: var(--white-tint-muted);
        }

        .assignment-note {
            font-size: 13px;
            color: var(--white-tint);
            padding: 8px;
            background-color: var(--darker-bg);
            border-radius: 4px;
            border-left: 3px solid var(--accent-orange);
        }

        /* ── Input Area ── */
        .input-area {
            padding: 20px 25px;
            border-top: 1px solid var(--border-color);
            background-color: var(--darker-bg);
            flex-shrink: 0;
        }

        .document-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .doc-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background-color: var(--hover-bg);
            border: 1px solid var(--accent-orange);
            border-radius: 4px;
            font-size: 12px;
            color: var(--white-tint);
        }

        .doc-chip .remove {
            cursor: pointer;
            color: var(--accent-orange-light);
            font-weight: bold;
            margin-left: 4px;
        }

        .input-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .upload-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            border: 2px dashed var(--accent-orange);
            background-color: transparent;
            color: var(--accent-orange-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 18px;
            flex-shrink: 0;
        }

        .upload-btn:hover {
            background-color: var(--accent-orange-dark);
            border-color: var(--accent-orange-light);
        }

        #file-input {
            display: none;
        }

        .input-box {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 12px;
            background-color: var(--hover-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .input-box:focus-within {
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 6, 0.1);
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--white-tint-light);
            resize: none;
            outline: none;
            font-family: inherit;
            font-size: 14px;
            padding: 12px 0;
            max-height: 100px;
            line-height: 1.4;
        }

        .input-box textarea::placeholder {
            color: var(--white-tint-muted);
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-orange-light));
            border: none;
            color: var(--darker-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-weight: bold;
            font-size: 16px;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Add Item Buttons ── */
        .add-item-btn {
            padding: 10px 14px;
            background-color: var(--accent-orange);
            color: var(--darker-bg);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 15px;
            transition: all 0.2s;
        }

        .add-item-btn:hover {
            background-color: var(--accent-orange-light);
            transform: translateY(-1px);
        }

        /* ── Empty State ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--white-tint-muted);
            text-align: center;
            padding: 40px;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* ── Modal ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--darker-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--accent-orange-light);
        }

        .modal-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background-color: var(--hover-bg);
            border: 1px solid var(--border-color);
            color: var(--white-tint);
            border-radius: 6px;
            font-family: inherit;
        }

        .modal-input::placeholder {
            color: var(--white-tint-muted);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .modal-btn.save {
            background-color: var(--accent-orange);
            color: var(--darker-bg);
        }

        .modal-btn.save:hover {
            background-color: var(--accent-orange-light);
        }

        .modal-btn.cancel {
            background-color: var(--hover-bg);
            color: var(--white-tint);
            border: 1px solid var(--border-color);
        }

        .modal-btn.cancel:hover {
            border-color: var(--accent-orange);
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-orange-dark);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-orange);
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">J</div>
                <div>
                    <div class="logo-text">Jarvis</div>
                    <span class="status-indicator"></span>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="chat">
                    <div class="tab-icon">💬</div>
                    <span>Chat</span>
                    <div class="tab-badge" id="chat-badge" style="display:none;">0</div>
                </button>
                <button class="tab-btn" data-tab="tasks">
                    <div class="tab-icon">✓</div>
                    <span>Tasks</span>
                    <div class="tab-badge" id="tasks-badge">0</div>
                </button>
                <button class="tab-btn" data-tab="assignments">
                    <div class="tab-icon">📝</div>
                    <span>Assignments</span>
                    <div class="tab-badge" id="assignments-badge">0</div>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Chat Tab -->
            <div class="tab-content active" id="content-chat">
                <div class="chat-messages" id="chat-messages">
                    <div class="empty-state">
                        <div class="empty-icon">🤖</div>
                        <div>Hello! I'm Jarvis, your AI assistant.<br>Start chatting or upload a document.</div>
                    </div>
                </div>
            </div>

            <!-- Tasks Tab -->
            <div class="tab-content" id="content-tasks">
                <button class="add-item-btn" id="add-task-btn">+ Add Task</button>
                <div class="tasks-list" id="tasks-list">
                    <div class="empty-state" style="height: auto; padding: 40px 20px;">
                        <div class="empty-icon">📋</div>
                        <div>No tasks yet. Click "Add Task" to create one!</div>
                    </div>
                </div>
            </div>

            <!-- Assignments Tab -->
            <div class="tab-content" id="content-assignments">
                <div class="assignments-list" id="assignments-list">
                    <div class="empty-state" style="height: auto; padding: 40px 20px;">
                        <div class="empty-icon">📚</div>
                        <div>No assignments yet. Assignments sync from the main app.</div>
                    </div>
                </div>
            </div>

            <!-- Input Area (Chat tab only) -->
            <div class="input-area" id="input-area">
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <div class="document-preview" id="document-preview"></div>
                    <div class="input-controls">
                        <button class="upload-btn" id="upload-btn" title="Upload Document">+</button>
                        <input type="file" id="file-input" accept=".pdf,.txt,.doc,.docx,.md" />
                        <div class="input-box">
                            <textarea
                                id="message-input"
                                placeholder="Ask me anything..."
                                rows="1"
                            ></textarea>
                            <button class="send-btn" id="send-btn">→</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Modal -->
    <div class="modal" id="task-modal">
        <div class="modal-content">
            <div class="modal-title">Add New Task</div>
            <input type="text" class="modal-input" id="task-title" placeholder="Task title">
            <input type="date" class="modal-input" id="task-due-date">
            <select class="modal-input" id="task-priority">
                <option value="low">Low Priority</option>
                <option value="medium" selected>Medium Priority</option>
                <option value="high">High Priority</option>
            </select>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeTaskModal()">Cancel</button>
                <button class="modal-btn save" onclick="saveTask()">Create Task</button>
            </div>
        </div>
    </div>

    <script>
        // State
        const state = {
            currentTab: 'chat',
            documents: [],
            selectedDocuments: [],
            tasks: [],
            assignments: [],
            isLoading: false
        };

        // DOM Elements
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');
        const tasksList = document.getElementById('tasks-list');
        const assignmentsList = document.getElementById('assignments-list');
        const inputArea = document.getElementById('input-area');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        // Tab Switching
        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                switchTab(tab);
            });
        });

        function switchTab(tab) {
            // Update buttons
            tabBtns.forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            // Update content
            tabContents.forEach(content => content.classList.remove('active'));
            document.getElementById(`content-${tab}`).classList.add('active');

            // Show/hide input area
            inputArea.style.display = tab === 'chat' ? 'block' : 'none';

            state.currentTab = tab;

            // Load data if needed
            if (tab === 'tasks' && state.tasks.length === 0) {
                loadTasks();
            }
            if (tab === 'assignments' && state.assignments.length === 0) {
                loadAssignments();
            }
        }

        // ── Chat Functions ──

        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 100) + 'px';
        });

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && state.selectedDocuments.length === 0) return;

            addMessage(text || '(analyzing documents)', 'user');
            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendBtn.disabled = true;

            try {
                const requestData = {
                    message: text,
                    documents: state.selectedDocuments,
                    tasks: state.tasks,
                    assignments: state.assignments
                };

                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                const data = await response.json();

                if (data.success) {
                    addMessage(data.response, 'assistant');

                    // If AI made changes to tasks, reload them
                    if (data.tasks_modified) {
                        await loadTasks();
                    }
                    if (data.assignments_modified) {
                        await loadAssignments();
                    }
                } else {
                    addMessage(`Error: ${data.error}`, 'assistant');
                }
            } catch (error) {
                addMessage(`Connection error: ${error.message}`, 'assistant');
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(text, role) {
            if (!text) return;

            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}`;

            const time = new Date().toLocaleTimeString('en-US', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });

            messageEl.innerHTML = `
                <div style="display: flex; flex-direction: column; width: 100%;">
                    <div class="message-content">${escapeHtml(text)}</div>
                </div>
            `;

            chatMessages.appendChild(messageEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            const emptyState = chatMessages.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
        }

        // ── Document Functions ──

        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            for (const file of files) {
                await uploadDocument(file);
            }
            fileInput.value = '';
        });

        async function uploadDocument(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/documents/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    state.documents.push({
                        id: data.id,
                        name: file.name,
                        size: file.size
                    });
                    updateDocumentUI();
                    addMessage(`✓ Uploaded: ${file.name}`, 'assistant');
                } else {
                    addMessage(`✗ Failed to upload ${file.name}`, 'assistant');
                }
            } catch (error) {
                addMessage(`✗ Error uploading ${file.name}`, 'assistant');
            }
        }

        function updateDocumentUI() {
            const preview = document.getElementById('document-preview');
            preview.innerHTML = state.documents.map(doc => `
                <div class="doc-chip">
                    <span>📄 ${doc.name}</span>
                    <span class="remove" onclick="removeDocument('${doc.id}')">×</span>
                </div>
            `).join('');
        }

        function removeDocument(docId) {
            state.documents = state.documents.filter(d => d.id !== docId);
            state.selectedDocuments = state.selectedDocuments.filter(d => d !== docId);
            updateDocumentUI();
        }

        // ── Tasks Functions ──

        document.getElementById('add-task-btn').addEventListener('click', openTaskModal);

        async function loadTasks() {
            try {
                const response = await fetch('/api/tasks');
                const data = await response.json();

                if (data.success) {
                    state.tasks = data.tasks || [];
                    renderTasks();
                    updateBadge('tasks-badge', state.tasks.length);
                }
            } catch (error) {
                console.error('Error loading tasks:', error);
            }
        }

        function renderTasks() {
            const list = document.getElementById('tasks-list');

            if (state.tasks.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="height: auto; padding: 40px 20px;">
                        <div class="empty-icon">📋</div>
                        <div>No tasks yet. Click "Add Task" to create one!</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = state.tasks.map(task => `
                <div class="task-item" onclick="toggleTask(${task.id})">
                    <div class="task-checkbox ${task.completed ? 'checked' : ''}">
                        ${task.completed ? '✓' : ''}
                    </div>
                    <div class="task-content">
                        <div class="task-title" style="${task.completed ? 'text-decoration: line-through; opacity: 0.6;' : ''}">${escapeHtml(task.title)}</div>
                        ${task.due_date ? `<div class="task-due">Due: ${new Date(task.due_date).toLocaleDateString()}</div>` : ''}
                    </div>
                    <div class="task-priority ${task.priority || 'medium'}">${(task.priority || 'medium').toUpperCase()}</div>
                    <div class="task-delete" onclick="event.stopPropagation(); deleteTask(${task.id})">🗑️</div>
                </div>
            `).join('');
        }

        function openTaskModal() {
            document.getElementById('task-modal').classList.add('active');
        }

        function closeTaskModal() {
            document.getElementById('task-modal').classList.remove('active');
        }

        async function saveTask() {
            const title = document.getElementById('task-title').value.trim();
            const dueDate = document.getElementById('task-due-date').value;
            const priority = document.getElementById('task-priority').value;

            if (!title) return;

            try {
                const response = await fetch('/api/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, due_date: dueDate, priority })
                });

                const data = await response.json();

                if (data.success) {
                    await loadTasks();
                    closeTaskModal();
                    document.getElementById('task-title').value = '';
                    document.getElementById('task-due-date').value = '';
                }
            } catch (error) {
                console.error('Error saving task:', error);
            }
        }

        async function toggleTask(taskId) {
            try {
                const task = state.tasks.find(t => t.id === taskId);
                const response = await fetch(`/api/tasks/${taskId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: !task.completed })
                });

                if (response.ok) {
                    await loadTasks();
                }
            } catch (error) {
                console.error('Error toggling task:', error);
            }
        }

        async function deleteTask(taskId) {
            try {
                const response = await fetch(`/api/tasks/${taskId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    await loadTasks();
                }
            } catch (error) {
                console.error('Error deleting task:', error);
            }
        }

        // ── Assignments Functions ──

        async function loadAssignments() {
            try {
                const response = await fetch('/api/assignments');
                const data = await response.json();

                if (data.success) {
                    state.assignments = data.assignments || [];
                    renderAssignments();
                    updateBadge('assignments-badge', state.assignments.filter(a => !a.completed_at).length);
                }
            } catch (error) {
                console.error('Error loading assignments:', error);
            }
        }

        function renderAssignments() {
            const list = document.getElementById('assignments-list');

            if (state.assignments.length === 0) {
                list.innerHTML = `
                    <div class="empty-state" style="height: auto; padding: 40px 20px;">
                        <div class="empty-icon">📚</div>
                        <div>No assignments. Assignments sync from the main app.</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = state.assignments.map(assignment => `
                <div class="assignment-item">
                    <div class="assignment-header">
                        <div class="assignment-title">${escapeHtml(assignment.title)}</div>
                    </div>
                    <div class="assignment-due">
                        Due: ${new Date(assignment.due_date).toLocaleDateString()}
                        ${assignment.completed_at ? '✓ Completed' : ''}
                    </div>
                    ${assignment.notes ? `<div class="assignment-note">${escapeHtml(assignment.notes)}</div>` : ''}
                </div>
            `).join('');
        }

        function updateBadge(badgeId, count) {
            const badge = document.getElementById(badgeId);
            if (count > 0) {
                badge.textContent = count;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }

        // Utility
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Init
        messageInput.focus();
    </script>
</body>
</html>
